version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shadowml_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shadowml
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MLflow ───────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: shadowml_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://postgres:password@postgres:5432/shadowml
      --default-artifact-root /mlartifacts
    volumes:
      - mlflow_artifacts:/mlartifacts
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Model V1 ─────────────────────────────────────────────────────────────
  model_v1:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.model_v1
    container_name: shadowml_model_v1
    init: true
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./backend/models/model_v1:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Model V2 ─────────────────────────────────────────────────────────────
  model_v2:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.model_v2
    container_name: shadowml_model_v2
    init: true
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./backend/models/model_v2:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Backend Gateway ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadowml_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/shadowml
      DATABASE_URL_SYNC: postgresql://postgres:password@postgres:5432/shadowml
      MODEL_V1_URL: http://model_v1:8001
      MODEL_V2_URL: http://model_v2:8002
      MLFLOW_TRACKING_URI: http://mlflow:5000
      APP_ENV: production
      SECRET_KEY: change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy
      model_v1:
        condition: service_healthy
      model_v2:
        condition: service_healthy

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: shadowml_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ─── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: shadowml_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d

  # ─── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: shadowml_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mlflow_artifacts:
  prometheus_data:
  grafana_data:
