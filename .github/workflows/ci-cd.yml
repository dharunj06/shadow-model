# trigger pipeline
name: ShadowML CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/shadowml

jobs:
  # ─── Lint & Test Backend ────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shadowml_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio anyio

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check backend/app --select E,F,W

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/shadowml_test
          DATABASE_URL_SYNC: postgresql://postgres:password@localhost:5432/shadowml_test
          MODEL_V1_URL: http://localhost:8001
          MODEL_V2_URL: http://localhost:8002
          SECRET_KEY: test-secret-key
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ─── Lint & Test Frontend ───────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build
        run: |
          cd frontend
          npm run build

  # ─── Build & Push Docker Images ─────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Build & push model_v1
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/Dockerfile.model_v1
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-model-v1:latest

      - name: Build & push model_v2
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/Dockerfile.model_v2
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-model-v2:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/Dockerfile.frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest

  # ─── Deployment Summary ─────────────────────────────────────────────────────
  publish-summary:
    name: Publish Build Summary
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Build Summary
        run: |
          echo "## ✅ CI/CD Pipeline Completed"
          echo ""
          echo "### Docker Images Published"
          echo "- Backend: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest\`"
          echo "- Frontend: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest\`"
          echo "- Model V1: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-model-v1:latest\`"
          echo "- Model V2: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-model-v2:latest\`"
          echo ""
          echo "### Next Steps"
          echo "1. Pull images: \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest\`"
          echo "2. Update docker-compose.yml with new image tags"
          echo "3. Deploy: \`docker compose up -d\`"
          echo ""
          echo "**Commit SHA**: \`${{ github.sha }}\`"
          echo "**Branch**: \`${{ github.ref }}\`"
