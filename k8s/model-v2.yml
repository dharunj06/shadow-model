apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-v2
  namespace: shadowml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-v2
      version: v2
  template:
    metadata:
      labels:
        app: model-v2
        version: v2
    spec:
      containers:
        - name: model-v2
          image: ghcr.io/YOUR_ORG/shadowml-model-v2:latest
          ports:
            - containerPort: 8002
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "800m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: model-v2-svc
  namespace: shadowml
spec:
  selector:
    app: model-v2
  ports:
    - port: 8002
      targetPort: 8002
