apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-v1
  namespace: shadowml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-v1
      version: v1
  template:
    metadata:
      labels:
        app: model-v1
        version: v1
    spec:
      containers:
        - name: model-v1
          image: ghcr.io/YOUR_ORG/shadowml-model-v1:latest
          ports:
            - containerPort: 8001
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: model-v1-svc
  namespace: shadowml
spec:
  selector:
    app: model-v1
  ports:
    - port: 8001
      targetPort: 8001
